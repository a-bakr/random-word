<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#18181b"/>

  <!-- Letter F (Faseeh) -->
  <text
    x="11"
    y="22"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >F</text>

  <!-- Voice / sound wave suggesting speech -->
  <g stroke="#a1a1aa" stroke-width="1.6" stroke-linecap="round">
    <line x1="18" y1="14" x2="18" y2="18"/>
    <line x1="21" y1="11" x2="21" y2="21"/>
    <line x1="24" y1="13" x2="24" y2="19"/>
  </g>
</svg>
